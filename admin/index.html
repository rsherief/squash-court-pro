<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Squash Court Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a2540 0%, #2a3a52 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #0f1419;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .login-container h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #1a2540;
    }

    .login-container p {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1a2540;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e0e4e8;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: #00d9ff;
      color: #1a2540;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 217, 255, 0.3);
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
    }

    .info-box {
      background: #f0f7ff;
      border-left: 4px solid #00d9ff;
      padding: 1rem;
      margin-top: 2rem;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #1a2540;
    }

    .info-box strong {
      display: block;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>⚡ Squash Court Pro</h1>
    <p>Admin Content Editor</p>

    <div class="error" id="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="off">
      </div>

      <button type="submit" class="login-btn">Login to Admin Panel</button>
    </form>

    <div class="info-box">
      <strong>Demo Credentials:</strong>
      Username: <code>admin</code><br>
      Password: <code>squash2024</code>
    </div>
  </div>

  <script>
    // Admin credentials (in real world, would be on secure server)
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'squash2024';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        // Login successful
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminUser', username);
        window.location.href = 'dashboard.html';
      } else {
        // Show error
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = '❌ Invalid username or password';
        errorDiv.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('adminLoggedIn')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
